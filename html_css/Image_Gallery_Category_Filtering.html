<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Gallery with Category Filtering</title>
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <style>
    body { background: #111; color: white; }
    .gallery-img { height: 180px; display: flex; align-items: center;
                   justify-content: center; font-size: 60px;
                   transition: transform 0.4s; }
    .gallery-item { overflow: hidden; border-radius: 10px; cursor: pointer; position: relative; }
    .gallery-item:hover .gallery-img { transform: scale(1.1); }
    /* Overlay on hover */
    .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6);
               opacity: 0; transition: opacity 0.3s;
               display: flex; flex-direction: column;
               align-items: center; justify-content: center; }
    .gallery-item:hover .overlay { opacity: 1; }
    .modal-content { background: #222; color: white; border: none; }
  </style>
</head>
<body>

<div class="container py-4">
  <h1 class="text-center mb-2">📸 Image Gallery</h1>
  <p class="text-center text-muted mb-4">Click category to filter · Click image to enlarge</p>

  <!-- FILTER BAR: Bootstrap btn-group -->
  <div class="d-flex flex-wrap justify-content-center gap-2 mb-4" id="filterBar">
    <button class="btn btn-light active" onclick="filterGallery('All', this)">All</button>
  </div>

  <!-- GALLERY GRID -->
  <div class="row g-3" id="galleryGrid"></div>
</div>

<!-- Bootstrap MODAL for lightbox -->
<div class="modal fade" id="galleryModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">
      <button class="btn-close btn-close-white ms-auto mb-3" data-bs-dismiss="modal"></button>
      <div id="modal-emoji" style="font-size:80px" class="mb-3"></div>
      <h4 id="modal-title"></h4>
      <p class="text-muted" id="modal-desc"></p>
      <span class="badge bg-primary" id="modal-cat"></span>
    </div>
  </div>
</div>

<script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const images = [
    { emoji:"🏔️", title:"Mountain Peak",  desc:"Snow-capped peaks at dawn",       color:"#1a1a2e", cat:"Nature"   },
    { emoji:"🌊", title:"Ocean Waves",     desc:"Serene ocean view at sunset",     color:"#0d3b6e", cat:"Nature"   },
    { emoji:"🌸", title:"Cherry Blossom", desc:"Spring petals in full bloom",     color:"#4a1040", cat:"Nature"   },
    { emoji:"🌆", title:"City Skyline",   desc:"Downtown at golden hour",         color:"#2d1b00", cat:"Urban"    },
    { emoji:"🏛️", title:"Old Temple",    desc:"Architecture of the ages",        color:"#1c3a1c", cat:"Urban"    },
    { emoji:"🚂", title:"Train Station",  desc:"Busy city railway station",       color:"#1a1a1a", cat:"Urban"    },
    { emoji:"🦁", title:"Lion Portrait",  desc:"King of the savanna",             color:"#3b2000", cat:"Wildlife" },
    { emoji:"🐬", title:"Dolphin Play",   desc:"Dolphins leaping in open sea",    color:"#003d5b", cat:"Wildlife" },
    { emoji:"🦋", title:"Butterfly",      desc:"Colorful wings in the garden",    color:"#1a2a1a", cat:"Wildlife" },
    { emoji:"🌌", title:"Milky Way",      desc:"Galaxy in long exposure shot",    color:"#0a0a1e", cat:"Space"    },
    { emoji:"🌙", title:"Full Moon",      desc:"Bright full moon over the sea",   color:"#0d1b2a", cat:"Space"    },
    { emoji:"⭐", title:"Starry Night",   desc:"Thousands of stars in the sky",   color:"#050510", cat:"Space"    },
  ];

  let activeFilter = "All";

  function buildFilters() {
    const bar = document.getElementById("filterBar");
    const cats = [...new Set(images.map(i => i.cat))];
    cats.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "btn btn-outline-light";
      btn.textContent = cat;
      btn.onclick = () => filterGallery(cat, btn);
      bar.appendChild(btn);
    });
  }

  function renderGallery() {
    const grid = document.getElementById("galleryGrid");
    grid.innerHTML = "";
    const filtered = activeFilter === "All" ? images : images.filter(i => i.cat === activeFilter);
    filtered.forEach((img, i) => {
      const col = document.createElement("div");
      col.className = "col-md-3 col-sm-4 col-6";
      col.innerHTML = `
        <div class="gallery-item" onclick="openModal('${img.emoji}','${img.title}','${img.desc}','${img.cat}')">
          <div class="gallery-img" style="background:${img.color}">${img.emoji}</div>
          <div class="overlay text-white text-center">
            <span class="badge bg-primary mb-1">${img.cat}</span>
            <h6 class="fw-bold">${img.title}</h6>
            <small>${img.desc}</small>
          </div>
        </div>
      `;
      grid.appendChild(col);
    });
  }

  function filterGallery(cat, btn) {
    activeFilter = cat;
    document.querySelectorAll("#filterBar .btn").forEach(b => {
      b.className = "btn btn-outline-light";
    });
    btn.className = "btn btn-light active";
    renderGallery();
  }

  function openModal(emoji, title, desc, cat) {
    document.getElementById("modal-emoji").textContent = emoji;
    document.getElementById("modal-title").textContent = title;
    document.getElementById("modal-desc").textContent  = desc;
    document.getElementById("modal-cat").textContent   = cat;
    new bootstrap.Modal(document.getElementById("galleryModal")).show();
  }

  buildFilters();
  renderGallery();
</script>
</body>
</html>
