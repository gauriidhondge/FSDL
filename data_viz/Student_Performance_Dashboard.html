<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Performance Dashboard</title>
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <!-- LOCAL Chart.js — works offline -->
  <script src="../node_modules/chart.js/dist/chart.umd.js"></script>
  <style> body { background: #f0f4f8; } </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow mb-4">
  <div class="container">
    <span class="navbar-brand fw-bold">📊 Student Performance Dashboard</span>
    <span class="badge bg-primary">Academic Year 2024-25</span>
  </div>
</nav>

<div class="container pb-4">

  <!-- STUDENT SELECTOR -->
  <div class="row justify-content-center mb-4">
    <div class="col-md-4">
      <div class="input-group">
        <span class="input-group-text">👤</span>
        <select class="form-select" id="studentSelect" onchange="updateDashboard()">
          <option value="0">Gauri Patil</option>
          <option value="1">Rahul Sharma</option>
          <option value="2">Priya Desai</option>
        </select>
      </div>
    </div>
  </div>

  <!-- STAT CARDS -->
  <div class="row g-3 mb-4" id="statCards"></div>

  <!-- CHARTS ROW -->
  <div class="row g-4">
    <div class="col-md-6">
      <div class="card shadow p-3">
        <h6 class="fw-bold mb-3">📈 Subject-wise Marks — Bar Chart</h6>
        <canvas id="marksChart" height="200"></canvas>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card shadow p-3">
        <h6 class="fw-bold mb-3">📊 Monthly Attendance — Line Chart</h6>
        <canvas id="attendanceChart" height="200"></canvas>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h6 class="fw-bold mb-3">🍩 Performance Grade — Doughnut</h6>
        <canvas id="gradeChart" height="220"></canvas>
      </div>
    </div>
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-header bg-dark text-white fw-bold">📋 Subject-wise Report</div>
        <div class="table-responsive">
          <table class="table table-striped mb-0 text-center align-middle">
            <thead class="table-dark">
              <tr><th>Subject</th><th>Internal</th><th>External</th><th>Total</th><th>Grade</th><th>Status</th></tr>
            </thead>
            <tbody id="subjectTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ===== STUDENT DATA =====
  const students = [
    {
      name: "Gauri Patil", rollNo: "21COMP045", overall: 84, attendance: 89,
      marks: [88, 76, 92, 68, 85, 79],
      monthly: [92, 88, 90, 85, 87, 91],
    },
    {
      name: "Rahul Sharma", rollNo: "21COMP032", overall: 71, attendance: 75,
      marks: [65, 72, 80, 60, 75, 74],
      monthly: [80, 75, 72, 68, 76, 74],
    },
    {
      name: "Priya Desai", rollNo: "21COMP058", overall: 91, attendance: 95,
      marks: [95, 88, 94, 85, 92, 90],
      monthly: [96, 95, 94, 93, 97, 95],
    }
  ];

  const subjects = ["HTML/CSS","JavaScript","Node.js","MongoDB","OS","DBMS"];
  const months   = ["Nov","Dec","Jan","Feb","Mar","Apr"];

  let marksChart = null, attendanceChart = null, gradeChart = null;

  function getGrade(marks) {
    if (marks >= 90) return { g:"O",  cls:"success" };
    if (marks >= 75) return { g:"A+", cls:"primary" };
    if (marks >= 60) return { g:"A",  cls:"info"    };
    if (marks >= 50) return { g:"B",  cls:"warning" };
    return                  { g:"C",  cls:"danger"  };
  }

  function updateDashboard() {
    const s = students[document.getElementById("studentSelect").value];

    // ===== STAT CARDS =====
    const overall = Math.round(s.marks.reduce((a,b)=>a+b,0)/s.marks.length);
    const grade   = getGrade(overall);
    document.getElementById("statCards").innerHTML = `
      <div class="col-md-3 col-6">
        <div class="card text-center shadow-sm border-primary">
          <div class="card-body"><div class="fs-1">🎓</div>
            <h5 class="fw-bold text-primary">${s.name.split(" ")[0]}</h5>
            <small class="text-muted">${s.rollNo}</small></div></div></div>
      <div class="col-md-3 col-6">
        <div class="card text-center shadow-sm border-success">
          <div class="card-body"><div class="fs-1">📝</div>
            <h4 class="fw-bold text-success">${overall}%</h4>
            <small class="text-muted">Overall Score</small></div></div></div>
      <div class="col-md-3 col-6">
        <div class="card text-center shadow-sm border-info">
          <div class="card-body"><div class="fs-1">📅</div>
            <h4 class="fw-bold text-info">${s.attendance}%</h4>
            <small class="text-muted">Attendance</small></div></div></div>
      <div class="col-md-3 col-6">
        <div class="card text-center shadow-sm border-warning">
          <div class="card-body"><div class="fs-1">🏅</div>
            <h4 class="fw-bold text-${grade.cls}">${grade.g}</h4>
            <small class="text-muted">Overall Grade</small></div></div></div>
    `;

    // ===== MARKS BAR CHART =====
    if (marksChart) marksChart.destroy();
    marksChart = new Chart(document.getElementById("marksChart"), {
      type: "bar",
      data: {
        labels: subjects,
        datasets: [{
          label: "Marks (out of 100)",
          data: s.marks,
          backgroundColor: ['#3498db','#27ae60','#e74c3c','#f39c12','#8e44ad','#16a085'],
          borderRadius: 5
        }]
      },
      options: { responsive:true, scales:{ y:{ beginAtZero:true, max:100 } } }
    });

    // ===== ATTENDANCE LINE CHART =====
    if (attendanceChart) attendanceChart.destroy();
    attendanceChart = new Chart(document.getElementById("attendanceChart"), {
      type: "line",
      data: {
        labels: months,
        datasets: [{
          label: "Attendance %",
          data: s.monthly,
          borderColor: "#27ae60",
          backgroundColor: "rgba(39,174,96,0.1)",
          fill: true, tension: 0.4
        }]
      },
      options: { responsive:true, scales:{ y:{ min:50, max:100 } } }
    });

    // ===== GRADE DOUGHNUT CHART =====
    if (gradeChart) gradeChart.destroy();
    gradeChart = new Chart(document.getElementById("gradeChart"), {
      type: "doughnut",
      data: {
        labels: ["Score", "Remaining"],
        datasets: [{
          data: [overall, 100-overall],
          backgroundColor: ["#27ae60","#ecf0f1"],
          borderWidth: 0
        }]
      },
      options: {
        responsive:true, cutout:"70%",
        plugins: {
          legend: { display:false },
          title:  { display:true, text: `${overall}% — Grade ${grade.g}`, font:{ size:16 } }
        }
      }
    });

    // ===== SUBJECT TABLE =====
    const tbody = document.getElementById("subjectTable");
    tbody.innerHTML = "";
    subjects.forEach((sub, i) => {
      const internal = Math.round(s.marks[i] * 0.4);
      const external = Math.round(s.marks[i] * 0.6);
      const gr = getGrade(s.marks[i]);
      tbody.innerHTML += `
        <tr>
          <td class="fw-bold">${sub}</td>
          <td>${internal}/40</td>
          <td>${external}/60</td>
          <td class="fw-bold">${s.marks[i]}/100</td>
          <td><span class="badge bg-${gr.cls}">${gr.g}</span></td>
          <td><span class="badge bg-${s.marks[i]>=40?'success':'danger'}">${s.marks[i]>=40?'Pass':'Fail'}</span></td>
        </tr>
      `;
    });
  }

  updateDashboard(); // load on start
</script>
</body>
</html>
