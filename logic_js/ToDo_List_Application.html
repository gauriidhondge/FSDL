<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List Application</title>
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <style>
    body { background: #f0f4f8; }
    /* Strike-through for completed tasks */
    .task-done .task-text { text-decoration: line-through; color: #aaa; }
    .delete-btn { opacity: 0; transition: opacity 0.2s; }
    .list-group-item:hover .delete-btn { opacity: 1; }
  </style>
</head>
<body>

<div class="container py-4">
  <h1 class="text-center mb-4">✅ To-Do List</h1>

  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow">
        <div class="card-body">

          <!-- ADD TASK: Bootstrap input-group -->
          <div class="input-group mb-3">
            <input type="text" id="taskInput" class="form-control form-control-lg"
              placeholder="Add a new task..." onkeydown="if(event.key==='Enter') addTask()"/>
            <button class="btn btn-primary" onclick="addTask()">+ Add</button>
          </div>

          <!-- FILTER BUTTONS: Bootstrap btn-group -->
          <div class="btn-group w-100 mb-3" role="group">
            <button class="btn btn-outline-secondary active" id="btn-all"
                    onclick="setFilter('all', this)">All</button>
            <button class="btn btn-outline-secondary" id="btn-active"
                    onclick="setFilter('active', this)">Active</button>
            <button class="btn btn-outline-secondary" id="btn-done"
                    onclick="setFilter('done', this)">Completed</button>
          </div>

          <!-- TASK LIST: Bootstrap list-group -->
          <ul class="list-group" id="taskList"></ul>

          <!-- FOOTER: count + clear -->
          <div class="d-flex justify-content-between mt-3 text-muted small">
            <span id="taskCount">0 tasks remaining</span>
            <button class="btn btn-sm btn-link text-danger p-0" onclick="clearCompleted()">
              Clear Completed
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let tasks = [], filter = "all", nextId = 1;

  function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();
    if (!text) { alert("Please enter a task!"); return; }
    tasks.push({ id: nextId++, text, done: false });
    input.value = "";
    renderTasks();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    renderTasks();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    renderTasks();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.done);
    renderTasks();
  }

  function setFilter(type, btn) {
    filter = type;
    document.querySelectorAll(".btn-group .btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderTasks();
  }

  function renderTasks() {
    const ul = document.getElementById("taskList");
    ul.innerHTML = "";
    const visible = tasks.filter(t =>
      filter === "active" ? !t.done : filter === "done" ? t.done : true
    );

    if (visible.length === 0) {
      ul.innerHTML = `<li class="list-group-item text-center text-muted">No tasks here 🎉</li>`;
    }

    visible.forEach(task => {
      const li = document.createElement("li");
      // Bootstrap list-group-item + d-flex for layout
      li.className = `list-group-item d-flex align-items-center gap-3 ${task.done ? "task-done" : ""}`;
      li.innerHTML = `
        <!-- Bootstrap form-check for checkbox -->
        <input type="checkbox" class="form-check-input" ${task.done ? "checked" : ""}
               onchange="toggleTask(${task.id})" style="width:18px;height:18px;cursor:pointer"/>
        <span class="flex-grow-1 task-text">${task.text}</span>
        <button class="btn btn-sm btn-link text-danger delete-btn p-0"
                onclick="deleteTask(${task.id})">🗑</button>
      `;
      ul.appendChild(li);
    });

    const remaining = tasks.filter(t => !t.done).length;
    document.getElementById("taskCount").textContent =
      `${remaining} task${remaining !== 1 ? 's' : ''} remaining`;
  }

  renderTasks();
</script>
</body>
</html>
