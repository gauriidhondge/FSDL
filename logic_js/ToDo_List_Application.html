<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Basic Calculator</title>
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <style>
    body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .calculator { width: 320px; background: #16213e; border-radius: 20px; padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    /* Display screen */
    .display { background: #0f3460; border-radius: 12px; padding: 16px; text-align: right; margin-bottom: 20px; }
    .expression { font-size: 13px; color: #7f8c8d; min-height: 18px; }
    .current-input { font-size: 36px; font-weight: bold; color: white; word-break: break-all; margin-top: 4px; font-family: monospace; }
    /* Custom button colors — Bootstrap btn classes used as base */
    .btn-num  { background: #1a3a5c !important; color: white !important; border: none !important; }
    .btn-op   { background: #e94560 !important; color: white !important; border: none !important; }
    .btn-clr  { background: #555    !important; color: white !important; border: none !important; }
    .btn-eq   { background: #27ae60 !important; color: white !important; border: none !important; }
    .calc-btn { font-size: 18px !important; font-weight: 600 !important; padding: 16px !important; border-radius: 10px !important; transition: transform 0.1s, filter 0.2s !important; }
    .calc-btn:hover  { filter: brightness(1.2); }
    .calc-btn:active { transform: scale(0.92); }
  </style>
</head>
<body>

<div class="calculator">
  <!-- DISPLAY SCREEN -->
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="current-input" id="currentInput">0</div>
  </div>

  <!-- BUTTON GRID: Bootstrap d-grid for equal-width columns -->
  <div class="d-grid gap-2" style="grid-template-columns: repeat(4,1fr); display:grid !important;">
    <!-- Row 1 -->
    <button class="btn calc-btn btn-clr" onclick="pressKey('AC')">AC</button>
    <button class="btn calc-btn btn-clr" onclick="pressKey('+/-')">+/-</button>
    <button class="btn calc-btn btn-clr" onclick="pressKey('%')">%</button>
    <button class="btn calc-btn btn-op"  onclick="pressKey('/')">÷</button>
    <!-- Row 2 -->
    <button class="btn calc-btn btn-num" onclick="pressKey('7')">7</button>
    <button class="btn calc-btn btn-num" onclick="pressKey('8')">8</button>
    <button class="btn calc-btn btn-num" onclick="pressKey('9')">9</button>
    <button class="btn calc-btn btn-op"  onclick="pressKey('*')">×</button>
    <!-- Row 3 -->
    <button class="btn calc-btn btn-num" onclick="pressKey('4')">4</button>
    <button class="btn calc-btn btn-num" onclick="pressKey('5')">5</button>
    <button class="btn calc-btn btn-num" onclick="pressKey('6')">6</button>
    <button class="btn calc-btn btn-op"  onclick="pressKey('-')">−</button>
    <!-- Row 4 -->
    <button class="btn calc-btn btn-num" onclick="pressKey('1')">1</button>
    <button class="btn calc-btn btn-num" onclick="pressKey('2')">2</button>
    <button class="btn calc-btn btn-num" onclick="pressKey('3')">3</button>
    <button class="btn calc-btn btn-op"  onclick="pressKey('+')">+</button>
    <!-- Row 5: 0 spans 2 cols, = spans 2 cols -->
    <button class="btn calc-btn btn-num" onclick="pressKey('0')" style="grid-column:span 2">0</button>
    <button class="btn calc-btn btn-num" onclick="pressKey('.')">.</button>
    <button class="btn calc-btn btn-eq"  onclick="pressKey('=')">=</button>
  </div>
</div>

<script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let currentValue = "0", storedValue = null, operator = null, shouldReset = false;
  const display = document.getElementById("currentInput");
  const expression = document.getElementById("expression");

  function pressKey(key) {
    if (key === "AC") {
      currentValue = "0"; storedValue = null; operator = null; shouldReset = false;
      expression.textContent = "";
    } else if (key === "+/-") {
      currentValue = String(parseFloat(currentValue) * -1);
    } else if (key === "%") {
      currentValue = String(parseFloat(currentValue) / 100);
    } else if (["+","-","*","/"].includes(key)) {
      if (storedValue !== null && operator && !shouldReset)
        currentValue = String(calculate(storedValue, currentValue, operator));
      storedValue = currentValue; operator = key; shouldReset = true;
      expression.textContent = `${storedValue} ${key}`;
    } else if (key === "=") {
      if (storedValue !== null && operator) {
        expression.textContent = `${storedValue} ${operator} ${currentValue} =`;
        currentValue = String(calculate(storedValue, currentValue, operator));
        storedValue = null; operator = null; shouldReset = true;
      }
    } else if (key === ".") {
      if (shouldReset) { currentValue = "0"; shouldReset = false; }
      if (!currentValue.includes(".")) currentValue += ".";
    } else {
      if (shouldReset) { currentValue = key; shouldReset = false; }
      else currentValue = currentValue === "0" ? key : currentValue + key;
    }
    updateDisplay();
  }

  function calculate(a, b, op) {
    a = parseFloat(a); b = parseFloat(b);
    switch(op) {
      case "+": return a + b;
      case "-": return a - b;
      case "*": return a * b;
      case "/": return b === 0 ? "Error" : a / b;
    }
  }

  function updateDisplay() {
    display.textContent = currentValue.length > 10
      ? parseFloat(currentValue).toExponential(4) : currentValue;
  }

  // Keyboard support
  document.addEventListener("keydown", e => {
    if ("0123456789".includes(e.key)) pressKey(e.key);
    else if (["+","-","*","/"].includes(e.key)) pressKey(e.key);
    else if (e.key === "Enter" || e.key === "=") pressKey("=");
    else if (e.key === "Escape") pressKey("AC");
    else if (e.key === "Backspace") {
      currentValue = currentValue.length > 1 ? currentValue.slice(0,-1) : "0";
      updateDisplay();
    }
  });
</script>
</body>
</html>
