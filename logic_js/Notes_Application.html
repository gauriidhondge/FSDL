<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes Application</title>
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <style>
    body { background: #fff8e1; }
    /* Sticky note card style */
    .note-card { border-radius: 10px; border: none; box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
                 transition: transform 0.2s; }
    .note-card:hover { transform: rotate(-1deg) scale(1.02); }
    /* Masonry-like column layout */
    .notes-grid { columns: 3 220px; gap: 16px; }
    .note-card-wrap { break-inside: avoid; margin-bottom: 16px; }
    .delete-note { opacity: 0; transition: opacity 0.2s; }
    .note-card:hover .delete-note { opacity: 1; }
    /* Color dot picker */
    .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
                 border: 3px solid transparent; display: inline-block; transition: border-color 0.2s; }
    .color-dot.selected { border-color: #333; }
  </style>
</head>
<body>

<!-- Bootstrap navbar -->
<nav class="navbar bg-warning navbar-expand">
  <div class="container">
    <span class="navbar-brand fw-bold">📝 Notes App</span>
    <span class="badge bg-dark" id="countBar">0 notes</span>
  </div>
</nav>

<div class="container py-4">

  <!-- ADD NOTE CARD: Bootstrap card form -->
  <div class="card shadow mb-4">
    <div class="card-body">
      <div class="mb-2">
        <input type="text" id="noteTitle" class="form-control fw-bold"
          placeholder="Note title..."/>
      </div>
      <div class="mb-2">
        <textarea id="noteBody" class="form-control" rows="3"
          placeholder="Write your note here..."></textarea>
      </div>
      <div class="d-flex align-items-center gap-3">
        <!-- Color picker dots -->
        <div id="colorPicker" class="d-flex gap-2"></div>
        <button class="btn btn-warning fw-bold ms-auto" onclick="addNote()">+ Add Note</button>
      </div>
    </div>
  </div>

  <!-- SEARCH: Bootstrap input-group -->
  <div class="input-group mb-3">
    <span class="input-group-text">🔍</span>
    <input type="text" id="searchInput" class="form-control"
      placeholder="Search notes..." oninput="renderNotes()"/>
  </div>

  <!-- NOTES GRID -->
  <div class="notes-grid" id="notesGrid"></div>

</div>

<script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const colors = ["#fff9c4","#c8e6c9","#bbdefb","#f8bbd0","#ffe0b2","#e1bee7"];
  let selectedColor = colors[0];
  // Load from localStorage: JSON.parse converts stored string back to JS array
  let notes = JSON.parse(localStorage.getItem("notesApp") || "[]");

  // ===== BUILD COLOR PICKER =====
  function buildColorPicker() {
    const picker = document.getElementById("colorPicker");
    colors.forEach((c, i) => {
      const dot = document.createElement("div");
      dot.className = "color-dot" + (i === 0 ? " selected" : "");
      dot.style.background = c;
      dot.onclick = () => {
        selectedColor = c;
        document.querySelectorAll(".color-dot").forEach(d => d.classList.remove("selected"));
        dot.classList.add("selected");
      };
      picker.appendChild(dot);
    });
  }

  // ===== ADD NOTE =====
  function addNote() {
    const title = document.getElementById("noteTitle").value.trim();
    const body  = document.getElementById("noteBody").value.trim();
    if (!title && !body) { alert("Note is empty!"); return; }
    notes.unshift({
      id: Date.now(), title: title || "Untitled", body,
      color: selectedColor,
      date: new Date().toLocaleDateString("en-IN", {day:"2-digit",month:"short",year:"numeric"})
    });
    // Save to localStorage: JSON.stringify converts JS array to string
    localStorage.setItem("notesApp", JSON.stringify(notes));
    renderNotes();
    document.getElementById("noteTitle").value = "";
    document.getElementById("noteBody").value  = "";
  }

  // ===== DELETE NOTE =====
  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    localStorage.setItem("notesApp", JSON.stringify(notes));
    renderNotes();
  }

  // ===== RENDER NOTES =====
  function renderNotes() {
    const query = document.getElementById("searchInput").value.toLowerCase();
    const grid  = document.getElementById("notesGrid");
    const filtered = notes.filter(n =>
      n.title.toLowerCase().includes(query) || n.body.toLowerCase().includes(query)
    );

    document.getElementById("countBar").textContent = `${filtered.length} note${filtered.length!==1?'s':''}`;

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="alert alert-warning text-center">📭 No notes found.</div>`;
      return;
    }

    grid.innerHTML = "";
    filtered.forEach(note => {
      const wrap = document.createElement("div");
      wrap.className = "note-card-wrap";
      wrap.innerHTML = `
        <div class="card note-card p-3 position-relative" style="background:${note.color}">
          <!-- Bootstrap btn-close for delete button -->
          <button class="btn btn-sm btn-link text-danger delete-note position-absolute top-0 end-0 p-1"
                  onclick="deleteNote(${note.id})">✕</button>
          <h6 class="fw-bold mb-1">${note.title}</h6>
          <p class="mb-2 small">${note.body}</p>
          <small class="text-muted">📅 ${note.date}</small>
        </div>
      `;
      grid.appendChild(wrap);
    });
  }

  buildColorPicker();
  renderNotes();
</script>
</body>
</html>
