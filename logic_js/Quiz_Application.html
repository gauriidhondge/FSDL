<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz Application</title>
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <style>
    body { background: #f0f4f8; }
    /* Option buttons: full width, text left aligned */
    .option-btn { text-align: left; transition: all 0.2s; }
    .option-btn.correct { background: #d1e7dd !important; border-color: #198754 !important; color: #198754 !important; font-weight: 700; }
    .option-btn.wrong   { background: #f8d7da !important; border-color: #dc3545 !important; color: #dc3545 !important; }
    .option-btn.skipped { background: #f8f9fa !important; color: #aaa !important; }
  </style>
</head>
<body>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-7">

      <!-- QUIZ SECTION -->
      <div id="quizSection">
        <div class="card shadow">
          <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <span class="fw-bold">📚 Web Dev Quiz</span>
            <!-- Bootstrap badge for question counter -->
            <span class="badge bg-primary" id="counter">Q1 / 8</span>
          </div>
          <div class="card-body p-4">
            <!-- Bootstrap progress bar for quiz completion -->
            <div class="progress mb-4" style="height:8px">
              <div class="progress-bar bg-success" id="progressBar" style="width:0%; transition:width 0.4s"></div>
            </div>

            <h5 class="mb-4 fw-bold" id="questionText"></h5>

            <!-- ANSWER OPTIONS: Bootstrap list of outline buttons -->
            <div class="d-grid gap-2 mb-3" id="optionsContainer"></div>

            <!-- FEEDBACK: Bootstrap alert shown after answering -->
            <div id="feedback" class="alert d-none"></div>

            <!-- NEXT BUTTON -->
            <button class="btn btn-primary w-100 d-none" id="nextBtn" onclick="nextQuestion()">
              Next Question →
            </button>
          </div>
        </div>
      </div>

      <!-- SCORE SECTION (hidden initially) -->
      <div id="scoreSection" class="d-none">
        <div class="card shadow text-center p-5">
          <div class="fs-1 mb-3" id="scoreEmoji">🎉</div>
          <h2 class="fw-bold">Quiz Complete!</h2>
          <!-- Bootstrap display heading for big score number -->
          <div class="display-3 fw-bold text-primary my-3" id="scoreDisplay">0/8</div>
          <p class="text-muted mb-4" id="scoreMsg"></p>
          <button class="btn btn-success btn-lg mb-4" onclick="restartQuiz()">🔄 Try Again</button>
          <!-- REVIEW SECTION -->
          <div id="reviewSection" class="text-start"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const questions = [
    { q:"What does HTML stand for?",
      opts:["Hyper Text Markup Language","High Text Machine Language","HyperTool Markup Language","Hyper Transfer Markup Language"], ans:0 },
    { q:"Which CSS property changes text color?",
      opts:["font-color","text-color","color","foreground"], ans:2 },
    { q:"Which JS method adds an element to end of array?",
      opts:["push()","pop()","shift()","append()"], ans:0 },
    { q:"What does DOM stand for?",
      opts:["Data Object Model","Document Object Model","Display Object Manager","Dynamic Object Markup"], ans:1 },
    { q:"Which tag creates a hyperlink in HTML?",
      opts:["<link>","<a>","<href>","<url>"], ans:1 },
    { q:"What does 'position: absolute' mean in CSS?",
      opts:["Relative to document","Relative to nearest positioned parent","Fixed to viewport","No positioning"], ans:1 },
    { q:"Which method selects an element by ID in JS?",
      opts:["querySelector()","getElementById()","getElementByClass()","findById()"], ans:1 },
    { q:"What is localStorage used for?",
      opts:["Server-side storage","Storing data in browser permanently","Temporary session data","Database queries"], ans:1 },
  ];

  let currentQ = 0, score = 0, answered = false, userAnswers = [];

  function renderQuestion() {
    const q = questions[currentQ];
    answered = false;

    document.getElementById("counter").textContent = `Q${currentQ+1} / ${questions.length}`;
    document.getElementById("progressBar").style.width = `${(currentQ/questions.length)*100}%`;
    document.getElementById("questionText").textContent = `Q${currentQ+1}. ${q.q}`;

    const container = document.getElementById("optionsContainer");
    container.innerHTML = "";
    q.opts.forEach((opt, i) => {
      const btn = document.createElement("button");
      // Bootstrap btn-outline-secondary for each option
      btn.className = "btn btn-outline-secondary option-btn";
      btn.textContent = `${String.fromCharCode(65+i)}. ${opt}`;
      btn.onclick = () => selectAnswer(i, btn);
      container.appendChild(btn);
    });

    document.getElementById("feedback").className = "alert d-none";
    document.getElementById("nextBtn").classList.add("d-none");
  }

  function selectAnswer(selectedIndex, clickedBtn) {
    if (answered) return;
    answered = true;
    const correct = questions[currentQ].ans;
    const isCorrect = selectedIndex === correct;
    userAnswers.push({ q: questions[currentQ].q, selected: selectedIndex, correct });

    // Highlight all buttons with Bootstrap color classes
    document.querySelectorAll(".option-btn").forEach((btn, i) => {
      btn.disabled = true;
      if (i === correct) btn.classList.add("correct");
      else if (i === selectedIndex) btn.classList.add("wrong");
      else btn.classList.add("skipped");
    });

    // Bootstrap alert feedback
    const fb = document.getElementById("feedback");
    if (isCorrect) {
      score++;
      fb.className = "alert alert-success";
      fb.textContent = "✅ Correct! Well done.";
    } else {
      fb.className = "alert alert-danger";
      fb.textContent = `❌ Wrong! Correct: ${questions[currentQ].opts[correct]}`;
    }

    const nextBtn = document.getElementById("nextBtn");
    nextBtn.textContent = currentQ < questions.length-1 ? "Next Question →" : "See Results 🎯";
    nextBtn.classList.remove("d-none");
  }

  function nextQuestion() {
    currentQ++;
    if (currentQ < questions.length) renderQuestion();
    else showScore();
  }

  function showScore() {
    document.getElementById("quizSection").classList.add("d-none");
    document.getElementById("scoreSection").classList.remove("d-none");
    const pct = Math.round((score/questions.length)*100);
    document.getElementById("scoreDisplay").textContent = `${score}/${questions.length}`;
    let emoji, msg;
    if (pct >= 80)      { emoji="🎉"; msg="Excellent! You're a web dev expert!"; }
    else if (pct >= 60) { emoji="😊"; msg="Good job! Keep practicing!"; }
    else if (pct >= 40) { emoji="🤔"; msg="Not bad, room to improve!"; }
    else                { emoji="😅"; msg="Keep studying — you'll get there!"; }
    document.getElementById("scoreEmoji").textContent = emoji;
    document.getElementById("scoreMsg").textContent = msg;

    // Bootstrap review list
    const reviewHtml = userAnswers.map((a, i) => {
      const cls = a.selected === a.correct ? "success" : "danger";
      const icon = cls === "success" ? "✅" : "❌";
      return `<div class="alert alert-${cls} py-2 px-3 mb-2">
        ${icon} Q${i+1}: ${a.q}<br>
        <small>Your answer: ${questions[i].opts[a.selected]}</small>
      </div>`;
    }).join("");
    document.getElementById("reviewSection").innerHTML = `<h5>📋 Review:</h5>${reviewHtml}`;
  }

  function restartQuiz() {
    currentQ=0; score=0; answered=false; userAnswers=[];
    document.getElementById("scoreSection").classList.add("d-none");
    document.getElementById("quizSection").classList.remove("d-none");
    renderQuestion();
  }

  renderQuestion();
</script>
</body>
</html>
