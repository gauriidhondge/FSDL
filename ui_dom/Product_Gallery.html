<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Gallery</title>
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <style>
    body { background: #f4f6f9; }
    /* Product image placeholder using emoji + colored background */
    .product-img {
      height: 160px; display: flex; align-items: center;
      justify-content: center; font-size: 60px;
    }
    /* Bootstrap card hover lift effect */
    .product-card { transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
    .product-card:hover { transform: translateY(-6px); box-shadow: 0 12px 24px rgba(0,0,0,0.15) !important; }
    .price { font-size: 20px; font-weight: 800; color: #dc3545; }
  </style>
</head>
<body>

<!-- Bootstrap navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand fw-bold">🛍️ Product Gallery</span>
    <!-- Bootstrap badge for cart count -->
    <span class="badge bg-danger fs-6" id="cartBadge">🛒 Cart: 0 items</span>
  </div>
</nav>

<div class="container py-4">
  <p class="text-center text-muted mb-4">Browse our top-rated products</p>
  <!-- Bootstrap row: auto-fill grid using col classes -->
  <div class="row g-4" id="productGrid"></div>
</div>

<script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ===== JSON DATASET =====
  const products = [
    { id:1, name:"Wireless Headphones", category:"Electronics", price:1999,  emoji:"🎧", color:"#e8f4fd" },
    { id:2, name:"Running Shoes",        category:"Footwear",    price:2499,  emoji:"👟", color:"#fef9e7" },
    { id:3, name:"Smart Watch",          category:"Electronics", price:5999,  emoji:"⌚", color:"#eafaf1" },
    { id:4, name:"Backpack",             category:"Accessories", price:1299,  emoji:"🎒", color:"#fdf2f8" },
    { id:5, name:"Laptop Stand",         category:"Gadgets",     price:799,   emoji:"💻", color:"#f0f4c3" },
    { id:6, name:"Water Bottle",         category:"Lifestyle",   price:499,   emoji:"🧴", color:"#e8f5e9" },
    { id:7, name:"Bluetooth Speaker",    category:"Electronics", price:3499,  emoji:"🔊", color:"#fce4ec" },
    { id:8, name:"Sunglasses",           category:"Accessories", price:999,   emoji:"🕶️", color:"#ede7f6" },
    { id:9, name:"Mechanical Keyboard",  category:"Gadgets",     price:4299,  emoji:"⌨️", color:"#e3f2fd" },
  ];

  let cartCount = 0;

  // ===== RENDER PRODUCTS =====
  // Creates Bootstrap card for each product in the JSON array
  function renderProducts() {
    const grid = document.getElementById("productGrid");
    grid.innerHTML = "";
    products.forEach(p => {
      // Bootstrap col-md-4: 3 columns on medium+ screens, full width on mobile
      const col = document.createElement("div");
      col.className = "col-md-4 col-sm-6";
      col.innerHTML = `
        <div class="card product-card shadow-sm h-100">
          <!-- Colored emoji placeholder as product image -->
          <div class="product-img" style="background:${p.color}">${p.emoji}</div>
          <div class="card-body d-flex flex-column">
            <h6 class="card-title fw-bold">${p.name}</h6>
            <!-- Bootstrap badge for category -->
            <span class="badge bg-secondary mb-2" style="width:fit-content">${p.category}</span>
            <div class="price mb-3">₹${p.price.toLocaleString()}</div>
            <!-- btn btn-dark: Bootstrap dark button for Buy Now -->
            <button class="btn btn-dark mt-auto w-100" onclick="addToCart(${p.id},'${p.name}')">
              🛒 Buy Now
            </button>
          </div>
        </div>
      `;
      grid.appendChild(col);
    });
  }

  // ===== ADD TO CART =====
  function addToCart(id, name) {
    cartCount++;
    document.getElementById("cartBadge").textContent =
      `🛒 Cart: ${cartCount} item${cartCount > 1 ? 's' : ''}`;
    alert(`✅ "${name}" added to cart!\nTotal: ${cartCount} item(s)`);
  }

  renderProducts();
</script>
</body>
</html>
